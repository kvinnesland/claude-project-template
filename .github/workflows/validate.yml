name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  traceability:
    name: Traceability validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run traceability validation
        run: npm run validate:traceability

      - name: Check commit messages reference a CR
        if: github.event_name == 'pull_request'
        run: |
          git log origin/${{ github.base_ref }}..HEAD --format="%s" | while read msg; do
            if ! echo "$msg" | grep -qE '(CR-[0-9]+|^Merge|^Revert|^INFRA:)'; then
              echo "FAIL: Commit missing CR reference: $msg"
              exit 1
            fi
          done
          echo "OK: All commits reference a CR"

  architecture:
    name: Architecture validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run architecture validation
        run: npm run validate:architecture

  spec:
    name: Spec validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run spec validation
        run: npm run validate:spec

  security:
    name: Security validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run security validation (heuristics)
        run: npm run validate:security

      - name: Secret scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: HEAD
          extra_args: --only-verified

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

  gdpr:
    name: GDPR validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run GDPR validation
        run: npm run validate:gdpr
